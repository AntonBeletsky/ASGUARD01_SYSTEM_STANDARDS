
<style>
#erd svg { width: 100%; }
#erd svg .label { font-family: var(--font-sans) !important; }
</style>
<div id="erd" style="padding: 8px 0; overflow-x: auto;"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#3C3489' : '#EEEDFE',
    primaryBorderColor: dark ? '#AFA9EC' : '#7F77DD',
    primaryTextColor: dark ? '#EEEDFE' : '#26215C',
    secondaryColor: dark ? '#085041' : '#E1F5EE',
    secondaryBorderColor: dark ? '#5DCAA5' : '#0F6E56',
    secondaryTextColor: dark ? '#E1F5EE' : '#04342C',
    tertiaryColor: dark ? '#3B6D11' : '#EAF3DE',
    tertiaryBorderColor: dark ? '#97C459' : '#3B6D11',
    tertiaryTextColor: dark ? '#EAF3DE' : '#173404',
  },
});
const diagram = `erDiagram
  DEPARTMENT {
    id id PK
    string code UK
    string name
    id head_teacher_id FK
  }
  SEMESTER {
    id id PK
    string label UK
    date start_date
    date end_date
    bool is_active
  }
  ROOM {
    id id PK
    string number UK
    int32 capacity
    bool has_computers
  }
  TEACHER {
    uuid id PK
    id department_id FK
    string last_name
    string email UK
    string academic_title
    bool is_active
  }
  STUDENT {
    uuid id PK
    string student_number UK
    string last_name
    string email UK
    int8 year_of_study
    decimal gpa
    bool is_active
  }
  COURSE {
    id id PK
    id department_id FK
    string code UK
    string title
    int8 credits
    int32 max_students
    bool is_elective
  }
  COURSE_TEACHER {
    id id PK
    id course_id FK
    uuid teacher_id FK
    id semester_id FK
    string role
  }
  LESSON {
    id id PK
    id course_id FK
    id semester_id FK
    uuid teacher_id FK
    id room_id FK
    enum lesson_type
    date scheduled_date
    time start_time
    bool is_cancelled
  }
  ENROLLMENT {
    id id PK
    uuid student_id FK
    id course_id FK
    id semester_id FK
    timestamp enrolled_at
    bool is_active
  }
  ATTENDANCE {
    id id PK
    uuid student_id FK
    id lesson_id FK
    enum status
    timestamp recorded_at
  }
  ASSIGNMENT {
    id id PK
    id course_id FK
    string title
    int32 max_score
    decimal weight
    datetime due_date
  }
  SUBMISSION {
    id id PK
    id assignment_id FK
    uuid student_id FK
    enum status
    decimal score
    uuid graded_by FK
  }
  COURSE_GRADE {
    id id PK
    id enrollment_id FK
    decimal numeric_score
    enum letter_grade
    bool passed
    uuid issued_by FK
  }

  DEPARTMENT ||--o{ TEACHER : "employs"
  DEPARTMENT ||--o{ COURSE : "offers"
  DEPARTMENT }o--|| TEACHER : "headed by"

  TEACHER ||--o{ COURSE_TEACHER : "assigned to"
  COURSE  ||--o{ COURSE_TEACHER : "taught by"
  SEMESTER||--o{ COURSE_TEACHER : "in"

  COURSE  ||--o{ LESSON : "has sessions"
  SEMESTER||--o{ LESSON : "during"
  TEACHER ||--o{ LESSON : "conducts"
  ROOM    ||--o{ LESSON : "hosts"

  STUDENT ||--o{ ENROLLMENT : "registers in"
  COURSE  ||--o{ ENROLLMENT : "receives"
  SEMESTER||--o{ ENROLLMENT : "for"

  STUDENT ||--o{ ATTENDANCE : "recorded at"
  LESSON  ||--o{ ATTENDANCE : "tracks"

  COURSE  ||--o{ ASSIGNMENT : "assigns"

  ASSIGNMENT ||--o{ SUBMISSION : "answered by"
  STUDENT    ||--o{ SUBMISSION : "submits"
  TEACHER    ||--o{ SUBMISSION : "grades"

  ENROLLMENT ||--|| COURSE_GRADE : "results in"
  TEACHER    ||--o{ COURSE_GRADE : "issues"
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
